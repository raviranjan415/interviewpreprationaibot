<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Practice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3498db',
                        secondary: '#2980b9',
                        darkBg: '#1a202c',
                        lightBg: '#f0f4f8',
                        accent1: '#4c51bf',
                        accent2: '#6b46c1',
                        accent3: '#805ad5'
                    },
                    fontFamily: {
                        sans: ['Roboto', 'Open Sans', 'sans-serif'],
                    },
                    animation: {
                        'typing': 'typing 1.5s steps(20, end)',
                        'blink': 'blink .75s infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        typing: {
                            'from': { width: '0' },
                            'to': { width: '100%' }
                        },
                        blink: {
                            'from, to': { borderColor: 'transparent' },
                            '50%': { borderColor: 'white' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    },
                    zIndex: {
                        '60': '60',
                        '70': '70',
                        '80': '80',
                        '90': '90',
                        '100': '100',
                    },
                    boxShadow: {
                        'neo': '5px 5px 10px rgba(0, 0, 0, 0.1), -5px -5px 10px rgba(255, 255, 255, 0.8)',
                        'neo-dark': '5px 5px 10px rgba(0, 0, 0, 0.3), -5px -5px 10px rgba(255, 255, 255, 0.05)',
                        '3d': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                        'inner-glow': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .text-shadow {
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        .hover-3d {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .hover-3d:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }
        
        /* Enhanced dark mode styling */
        .dark .glass-effect {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(99, 102, 241, 0.15);
        }
        
        /* Message styling enhancements */
        .dark #chat-container > div:not(.welcome-message) {
            border: 1px solid rgba(99, 102, 241, 0.1);
            transition: all 0.3s ease;
        }
        
        .dark #chat-container > div.self-start:not(.welcome-message) {
            background: linear-gradient(to right, rgba(30, 41, 59, 0.9), rgba(30, 41, 59, 0.7));
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(99, 102, 241, 0.1);
        }
        
        .dark #chat-container > div.self-end:not(.welcome-message) {
            background: linear-gradient(to right, rgba(51, 65, 85, 0.9), rgba(51, 65, 85, 0.7));
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-lightBg via-blue-50 to-purple-50 dark:from-gray-950 dark:via-gray-900 dark:to-indigo-950 text-gray-800 dark:text-gray-200 transition-colors duration-500 min-h-screen">
    <!-- Decorative background elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <!-- Enhanced background elements for dark mode -->
        <div class="absolute top-20 left-10 w-64 h-64 bg-gradient-radial from-blue-300/20 to-transparent rounded-full blur-xl dark:from-blue-500/20 dark:animate-pulse"></div>
        <div class="absolute bottom-20 right-10 w-80 h-80 bg-gradient-radial from-purple-300/20 to-transparent rounded-full blur-xl dark:from-purple-500/20 dark:animate-pulse"></div>
        <div class="absolute top-1/3 right-1/4 w-40 h-40 bg-gradient-radial from-green-300/10 to-transparent rounded-full blur-xl dark:from-teal-500/15 dark:animate-pulse"></div>
        <div class="absolute bottom-1/4 left-1/4 w-56 h-56 bg-gradient-radial from-transparent to-transparent rounded-full blur-xl dark:from-indigo-600/10 dark:animate-pulse hidden dark:block"></div>
        <!-- Subtle animated particles for dark mode -->
        <div class="hidden dark:block absolute inset-0">
            <div class="absolute h-1 w-1 rounded-full bg-white/10 top-[10%] left-[25%] animate-ping" style="animation-duration: 3s; animation-delay: 0.5s"></div>
            <div class="absolute h-1 w-1 rounded-full bg-white/10 top-[30%] left-[80%] animate-ping" style="animation-duration: 4s; animation-delay: 1s"></div>
            <div class="absolute h-1 w-1 rounded-full bg-white/10 top-[70%] left-[5%] animate-ping" style="animation-duration: 5s; animation-delay: 1.5s"></div>
            <div class="absolute h-1 w-1 rounded-full bg-white/10 top-[60%] left-[60%] animate-ping" style="animation-duration: 6s; animation-delay: 2s"></div>
            <div class="absolute h-1 w-1 rounded-full bg-white/10 top-[20%] left-[50%] animate-ping" style="animation-duration: 7s; animation-delay: 2.5s"></div>
        </div>
    </div>

    <div class="container mx-auto max-w-4xl h-screen flex flex-col relative z-10">
        <header class="bg-white/80 dark:bg-gray-800/90 dark:backdrop-blur-lg glass-effect p-4 rounded-b-xl shadow-3d flex justify-between items-center z-20 relative mt-0 border-t border-white/50 dark:border-indigo-900/30 dark:bg-gradient-to-r dark:from-gray-800/90 dark:to-gray-900/90">
            <h1 class="text-primary dark:text-blue-400 text-xl md:text-2xl font-bold text-shadow">AI Interview Practice Assistant</h1>
            <div class="flex items-center space-x-2">
                <i class="fas fa-moon text-gray-600 dark:text-gray-300"></i>
                <label class="relative inline-block w-12 h-6">
                    <input type="checkbox" id="theme-switch" class="opacity-0 w-0 h-0">
                    <span class="absolute cursor-pointer top-0 left-0 right-0 bottom-0 bg-gray-300 rounded-full transition-colors duration-300 before:absolute before:content-[''] before:h-4 before:w-4 before:left-1 before:bottom-1 before:bg-white before:rounded-full before:transition-transform before:duration-300 before:shadow-md peer-checked:bg-accent2 peer-checked:before:transform peer-checked:before:translate-x-6"></span>
                </label>
                <i class="fas fa-sun text-amber-500"></i>
            </div>
        </header>
        
        <main class="flex-1 p-4 overflow-hidden flex flex-col">
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 bg-white/90 dark:bg-gray-800/80 dark:backdrop-blur-md glass-effect rounded-xl shadow-3d flex flex-col space-y-4 z-10 relative border border-white/50 dark:border-indigo-900/30 dark:shadow-lg dark:shadow-indigo-900/5">
                <div class="welcome-message bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-800 dark:to-gray-900 dark:bg-gradient-to-br p-5 rounded-xl text-center hover-3d shadow-neo dark:shadow-neo-dark dark:border dark:border-indigo-900/30">
                    <h2 class="text-xl font-bold mb-2 text-accent1 dark:text-blue-400">Welcome to your Interview Practice Assistant!</h2>
                    <p class="mb-4">I can help you practice technical interview questions. Choose a topic below or type your own question.</p>
                    <div class="flex flex-wrap justify-center gap-2">
                        <button class="topic-btn bg-gradient-to-r from-primary to-accent1 hover:from-accent1 hover:to-primary text-white py-2 px-4 rounded-full transition-all duration-300 transform hover:scale-105 hover:shadow-lg hover:rotate-1" data-topic="data-structures">Data Structures</button>
                        <button class="topic-btn bg-gradient-to-r from-primary to-accent2 hover:from-accent2 hover:to-primary text-white py-2 px-4 rounded-full transition-all duration-300 transform hover:scale-105 hover:shadow-lg hover:rotate-1" data-topic="algorithms">Algorithms</button>
                        <button class="topic-btn bg-gradient-to-r from-primary to-accent3 hover:from-accent3 hover:to-primary text-white py-2 px-4 rounded-full transition-all duration-300 transform hover:scale-105 hover:shadow-lg hover:rotate-1" data-topic="system-design">System Design</button>
                        <button class="topic-btn bg-gradient-to-r from-accent1 to-accent2 hover:from-accent2 hover:to-accent1 text-white py-2 px-4 rounded-full transition-all duration-300 transform hover:scale-105 hover:shadow-lg hover:rotate-1" data-topic="javascript">JavaScript</button>
                        <button class="topic-btn bg-gradient-to-r from-accent2 to-accent3 hover:from-accent3 hover:to-accent2 text-white py-2 px-4 rounded-full transition-all duration-300 transform hover:scale-105 hover:shadow-lg hover:rotate-1" data-topic="python">Python</button>
                    </div>
                </div>
                <!-- Chat messages will be appended here -->
            </div>
        </main>
        
        <footer class="p-4 z-20 relative">
            <div class="flex items-center space-x-2 bg-white/80 dark:bg-gray-800/90 dark:backdrop-blur-lg glass-effect rounded-xl p-3 shadow-3d border border-white/50 dark:border-indigo-900/30 dark:bg-gradient-to-r dark:from-gray-800/90 dark:to-gray-900/90">
                <textarea id="user-input" class="flex-1 p-3 border-none rounded-lg bg-gray-100 dark:bg-gray-700/90 dark:text-white resize-none h-12 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-indigo-500 transition-all duration-300 shadow-inner-glow dark:placeholder-gray-400" placeholder="Type your question here..."></textarea>
                <button id="send-btn" class="w-12 h-12 rounded-full bg-gradient-to-r from-primary to-accent1 hover:from-accent1 hover:to-primary text-white flex justify-center items-center transition-all duration-300 transform hover:scale-110 hover:rotate-12 shadow-lg">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </div>
    
    <div id="loading-spinner" class="fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm flex justify-center items-center z-50 hidden">
        <div class="spinner-container bg-white/10 p-8 rounded-2xl glass-effect animate-float">
            <div class="w-16 h-16 border-4 border-blue-200 border-t-primary rounded-full animate-spin"></div>
            <p class="text-white mt-4 font-medium text-shadow">Thinking...</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
